services:
  db:
    image: postgres:16-alpine
    container_name: owndelivery_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-OwnDeliveryDb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-OwnDeliveryDb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: owndelivery_api
    restart: unless-stopped
    ports:
      - "5134:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-OwnDeliveryDb};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Jwt__Issuer: ${JWT_ISSUER:-OwnDeliveryApi}
      Jwt__Audience: ${JWT_AUDIENCE:-OwnDeliveryApi}
      Jwt__ExpiresInMinutes: ${JWT_EXPIRES_MINUTES:-60}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
